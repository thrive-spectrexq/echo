# Echo — EAS Build (iOS)
# Triggered manually or on release tags.
# Builds the iOS app via Expo Application Services.

name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - all
  push:
    tags:
      - 'v*'

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx jest --ci --maxWorkers=2

      - name: Build with EAS
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform || 'ios' }} \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive
