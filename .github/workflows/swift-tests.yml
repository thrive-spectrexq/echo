# Echo — Swift Native Module Tests
# Runs XCTest suites for Swift/Objective-C native modules.
# Triggered on push/PR when native code changes.

name: Swift Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'ios/**'
      - 'modules/**'
      - '*.podspec'
      - 'Podfile*'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'modules/**'
      - '*.podspec'
      - 'Podfile*'
  workflow_dispatch:

concurrency:
  group: swift-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-tests:
    name: XCTest (iOS ${{ matrix.ios-version }})
    runs-on: macos-15
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        ios-version: ['18.0']
        xcode-version: ['16.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode-version }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode-version }}.app

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native project
        run: npx expo prebuild --platform ios --clean

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build and test
        run: |
          xcodebuild test \
            -workspace ios/Echo.xcworkspace \
            -scheme Echo \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=${{ matrix.ios-version }}' \
            -resultBundlePath TestResults \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-results-ios-${{ matrix.ios-version }}
          path: TestResults.xcresult
          retention-days: 7

  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Swift code
        run: |
          if [ -d "ios" ]; then
            swiftlint lint --path ios --reporter github-actions-logging --quiet
          fi
          if [ -d "modules" ]; then
            swiftlint lint --path modules --reporter github-actions-logging --quiet
          fi
